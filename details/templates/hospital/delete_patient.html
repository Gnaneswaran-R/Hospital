{% extends 'base.html' %}

{% block title %}Delete Patient{% endblock %}

{% block content %}
<a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm mb-4">&#8592; Back</a>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0 p-4 text-center">
            <div class="mb-3">
                <span class="badge bg-danger rounded-pill py-2 px-3"><i class="bi bi-exclamation-octagon-fill me-2"></i>Delete Confirmation</span>
            </div>
            <h1 class="h5 mb-3">Delete {{ patient.name }}</h1>
            <p class="text-muted">This action will permanently remove the patient record from the system.</p>
            <div class="d-flex gap-2 justify-content-center mt-4 flex-wrap">
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
